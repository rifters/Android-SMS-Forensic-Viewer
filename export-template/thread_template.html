<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><!-- THREAD NAME --></title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/thread.css">
</head>
<body class="thread-page">

    <!--
        Replace "group" class with "direct" for 1-to-1 conversations.
        The .group class applies a purple header.
    -->
    <div class="thread-header <!-- group OR direct -->">
        <a href="timeline.html" class="back-btn">← Timeline</a>
        <h1><!-- THREAD NAME --></h1>
        <p class="participants"><!-- PARTICIPANT NAMES --></p>
    </div>

    <!--
        Each message bubble follows this pattern:
        ─────────────────────────────────────────────
        Incoming:
        <div id="msg_8842" class="message incoming">
            <div class="bubble">
                <div class="sender">Mom</div>
                <div class="text">We're waiting</div>
                <div class="time">2024-05-06 14:14</div>
            </div>
        </div>

        Outgoing:
        <div id="msg_8843" class="message outgoing">
            <div class="bubble">
                <div class="sender">Me</div>
                <div class="text">Be right there!</div>
                <div class="time">2024-05-06 14:15</div>
            </div>
        </div>

        With MMS attachment badges:
        <div id="msg_8844" class="message incoming">
            <div class="bubble">
                <div class="sender">Mom</div>
                <div class="text">Check this out</div>
                <div class="attachments">
                    <span class="attachment image-att">📷 photo.jpg</span>
                </div>
                <div class="time">2024-05-06 14:16</div>
            </div>
        </div>

        Date separator between days:
        <div class="date-separator"><span>Monday, 6 May 2024</span></div>
        ─────────────────────────────────────────────

        When navigated to via #msg_<id>, thread.js will:
          1. Colorize each incoming sender with a unique color (colorizeParticipants)
          2. Add the class "highlight" and scroll the targeted element into view
    -->
    <div id="messages">
        <!-- Generated message bubbles go here -->
    </div>

    <script src="assets/thread.js"></script>
</body>
</html>
